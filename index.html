<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Підборідочні бої — Турніри</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #060913;
            --accent-blue: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --card-bg: rgba(20, 27, 41, 0.75);
            --fighter-bg: rgba(13, 19, 30, 0.85);
            --text-main: #ffffff;
            --winner-green: #00e676;
            --loser-red: #ff1744;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #04060f, #0b1424, #03050a);
            background-size: 400% 400%;
            animation: liveGradient 15s ease infinite;
            color: var(--text-main);
            margin: 0;
            padding: 20px 20px 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes liveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .page {
            display: none;
            width: 100%;
            max-width: 1200px;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .page.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
        }

        h1 {
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            font-size: 24px;
            text-shadow: 0 0 20px var(--accent-glow);
            text-align: center;
        }

        .admin-gear {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 26px;
            color: #64748b;
            transition: color var(--transition-fast), transform 0.5s ease;
            padding: 5px;
        }
        .admin-gear:hover { color: var(--accent-blue); transform: rotate(90deg); }
        .admin-gear.active { color: var(--winner-green); text-shadow: 0 0 10px rgba(0, 230, 118, 0.5); transform: rotate(180deg); }

        .tabs-container {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
            background: rgba(13, 19, 30, 0.6);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #64748b;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition-fast);
        }
        .tab-btn.active {
            background: var(--card-bg);
            color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.15), inset 0 0 10px rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .content-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 500px;
        }

        .tournament-card {
            background: var(--card-bg);
            border: 1.5px solid #1e293b;
            border-radius: 16px;
            padding: 18px 22px;
            font-size: 16px;
            font-weight: 600;
            backdrop-filter: blur(8px);
            transition: transform 0.1s ease, border-color var(--transition-fast), box-shadow var(--transition-fast);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tournament-card:active {
            transform: scale(0.98);
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .tournament-info { cursor: pointer; flex-grow: 1; }

        .leader-card {
            background: var(--card-bg);
            border: 1.5px solid #1e293b;
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .leader-row { display: flex; justify-content: space-between; align-items: center; }
        
        .leader-clickable {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex-grow: 1;
            transition: transform 0.1s ease;
        }
        .leader-clickable:active { transform: scale(0.98); }

        .mini-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #1e293b;
            border: 1.5px solid var(--accent-blue);
            object-fit: cover;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
        }
        .leader-rank { font-weight: 800; color: #64748b; font-size: 15px; min-width: 28px; }
        .leader-rank.rank-1 { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .leader-rank.rank-2 { color: #e2e8f0; text-shadow: 0 0 8px rgba(255, 255, 255, 0.3); }
        .leader-rank.rank-3 { color: #ffaa66; }
        
        .leader-name { font-weight: 700; font-size: 16px; letter-spacing: 0.3px; }
        .leader-stats { display: flex; gap: 12px; align-items: center; }
        .kd-badge {
            background: rgba(0, 229, 255, 0.08);
            color: var(--accent-blue);
            padding: 3px 9px;
            border-radius: 8px;
            font-weight: 700;
            font-family: monospace;
            border: 1px solid rgba(0, 229, 255, 0.15);
        }

        .admin-controls { display: none; gap: 8px; align-items: center; }
        body.admin-mode .admin-controls { display: flex; }
        
        .btn-action { 
            background: rgba(30, 41, 59, 0.5); 
            border: 1px solid #334155; 
            cursor: pointer; 
            font-size: 15px; 
            padding: 6px; 
            border-radius: 8px;
        }

        .btn-add-global {
            display: none;
            background: rgba(0, 229, 255, 0.03);
            border: 2px dashed rgba(0, 229, 255, 0.4);
            color: var(--accent-blue);
            padding: 15px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            max-width: 500px;
        }
        body.admin-mode .btn-add-global { display: block; }

        .admin-panel {
            display: none;
            background: rgba(20, 27, 41, 0.95);
            border: 1.5px solid var(--accent-blue);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 25px;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }
        body.admin-mode .admin-panel { display: flex; }
        
        .admin-panel input[type="number"] {
            background: #060913;
            border: 1px solid #334155;
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            width: 70px;
            text-align: center;
        }

        .admin-panel button {
            background: var(--accent-blue);
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Турнірна Сітка */
        .bracket {
            display: flex;
            gap: 40px;
            width: 100%;
            padding: 20px 10px;
            overflow-x: auto;
            justify-content: flex-start;
            align-items: center;
        }
        .round { display: flex; flex-direction: column; justify-content: space-around; gap: 30px; min-height: 520px; min-width: 220px; }
        .matchup { 
            background: var(--card-bg); 
            border: 1.5px solid #1e293b; 
            border-radius: 16px; 
            width: 220px; 
            padding: 12px; 
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .match-title { font-size: 11px; color: #64748b; text-align: center; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .fighter { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: var(--fighter-bg); 
            padding: 10px 12px; 
            margin: 6px 0; 
            border-radius: 10px; 
            border: 1.5px solid transparent; 
            transition: all var(--transition-fast);
        }
        .fighter-name-wrapper {
            cursor: pointer;
            flex-grow: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 600;
        }
        
        .winner { border-color: var(--winner-green) !important; background: rgba(0, 230, 118, 0.05) !important; }
        .winner .fighter-name-wrapper { color: var(--winner-green) !important; font-weight: 700; }
        .loser { border-color: var(--loser-red) !important; opacity: 0.4; }
        .loser .fighter-name-wrapper { color: var(--loser-red) !important; text-decoration: line-through; }

        .btn-crown { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px; filter: grayscale(1); transition: filter var(--transition-fast), transform var(--transition-fast); }
        .winner .btn-crown { filter: grayscale(0); transform: scale(1.1); }
        body:not(.admin-mode) .btn-crown { pointer-events: none; }

        .btn-back { background: none; border: 2px solid #334155; color: #64748b; padding: 12px 24px; border-radius: 12px; cursor: pointer; margin-top: 25px; font-weight: bold; transition: all var(--transition-fast); }
        .btn-back:hover { color: white; border-color: white; }

        .app-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(6, 9, 19, 0.88); backdrop-filter: blur(16px); border-top: 1.5px solid rgba(255, 255, 255, 0.05); padding: 14px 20px; display: flex; justify-content: space-between; gap: 15px; box-sizing: border-box; z-index: 900; }
        .footer-btn { flex: 1; background: var(--card-bg); border: 1.5px solid #1e293b; color: var(--text-main); padding: 14px; border-radius: 12px; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .footer-btn.donate-style { border-color: rgba(0, 229, 255, 0.3); box-shadow: 0 0 15px rgba(0, 229, 255, 0.1); color: var(--accent-blue); }

        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(3, 5, 10, 0.85); 
            backdrop-filter: blur(6px); 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            padding: 15px; 
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .modal.show { opacity: 1; }
        
        .modal-content { 
            background: #0f1624; 
            border: 1.5px solid rgba(0, 229, 255, 0.3); 
            padding: 24px; 
            border-radius: 20px; 
            text-align: center; 
            width: 100%; 
            max-width: 360px; 
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6); 
            box-sizing: border-box;
            transform: scale(0.9);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal.show .modal-content { transform: scale(1); }

        .modal-content input { 
            background: #060913; 
            border: 1.5px solid #22314d; 
            color: white; 
            padding: 12px; 
            border-radius: 10px; 
            font-size: 16px; 
            text-align: center; 
            margin-bottom: 15px; 
            width: 100%; 
            box-sizing: border-box;
        }

        .chat-links-list { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .chat-link-item { background: var(--fighter-bg); border: 1.5px solid #1e293b; padding: 14px; border-radius: 12px; color: white; text-decoration: none; font-weight: 600; display: flex; justify-content: space-between; }
        .crypto-box { background: #060913; border: 1.5px dashed #22314d; padding: 14px; border-radius: 12px; font-family: monospace; font-size: 12px; color: #94a3b8; word-break: break-all; margin: 15px 0; user-select: all; }
        .modal-btn-action { background: var(--accent-blue); color: black; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; width: 100%; }

        .profile-box { text-align: left; }
        .profile-avatar-container { display: flex; justify-content: center; margin-bottom: 18px; }
        .profile-img { width: 115px; height: 115px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent-blue); background: #1e293b; }
        .profile-name { font-size: 22px; font-weight: bold; color: var(--accent-blue); text-align: center; margin-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px; }
        .profile-grid { display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .profile-item { display: flex; justify-content: space-between; background: rgba(13, 19, 30, 0.6); padding: 10px 14px; border-radius: 10px; align-items: center; }
        .profile-item label { color: #94a3b8; font-weight: 500; }
        .profile-item span { font-weight: 700; }
    </style>
</head>
<body>

        <div class="modal-content">

    <div id="main-page" class="page active">
        <div class="header-container">
            <h1 id="main-title">🏆 Панель Турнірів 🏆</h1>
            <button class="admin-gear" id="mainGear" onclick="openPasswordModal()">⚙️</button>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" id="tab-tournaments" onclick="switchTab('tournaments')">⚔️ Турніри</button>
            <button class="tab-btn" id="tab-leaderboard" onclick="switchTab('leaderboard')">🔥 Лідерборд</button>
        </div>

        <div id="tournaments-section" class="content-list">
            <div id="tournaments-container"></div>
            <button class="btn-add-global" onclick="addNewTournament()">➕ Додати новий турнір</button>
        </div>

        <div id="leaderboard-section" class="content-list" style="display: none;">
            <div id="loading-text" style="text-align:center; color:var(--accent-blue);">Завантаження даних з таблиці...</div>

    <div id="bracket-page" class="page">
        <div class="header-container">
            <h1 id="active-tournament-title">Сітка боїв</h1>

        <div class="admin-panel">
            <label>Кількість бійців:</label>

    <footer class="app-footer">
        <button class="footer-btn" onclick="openModal('chatsModal')">💬 Наші чати</button>
        <button class="footer-btn donate-style" onclick="openModal('donateModal')">💎 Донат</button>
    </footer>

    <script>
        const SPREADSHEET_ID = '1qsUMSrSEvVQqx5gc8aPbtJXAgI5ciGK1zQwyB8sviH8';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        const tg = window.Telegram.WebApp;
        if(tg) tg.expand();

        let tournamentsData = JSON.parse(localStorage.getItem('tournamentsData')) || [
            { id: 1, title: "Тurnir #1: Перша Кров", size: 8 }
        ];

        let fightersData = []; 
        let currentTournamentId = null;
        let currentTab = 'tournaments';

        function def(id){ return document.getElementById(id); }

        function openModal(id) {
            const m = def(id);
            m.style.display = 'flex';
            setTimeout(() => m.classList.add('show'), 10);
        }

        function closeModal(id) {
            const m = def(id);
            m.classList.remove('show');
            setTimeout(() => m.style.display = 'none', 250);
        }

        function switchTab(tab) {
            if(currentTab === tab) return;
            currentTab = tab;
            if (tab === 'tournaments') {
                def('tab-tournaments').classList.add('active');
                def('tab-leaderboard').classList.remove('active');
                def('leaderboard-section').style.display = 'none';
                def('tournaments-section').style.display = 'flex';
                def('main-title').innerText = "🏆 Панель Турнірів 🏆";
            } else {
                def('tab-tournaments').classList.remove('active');
                def('tab-leaderboard').classList.add('active');
                def('tournaments-section').style.display = 'none';
                def('leaderboard-section').style.display = 'flex';
                def('main-title').innerText = "👑 Топ Бійців 👑";
                loadFightersFromSheets();
            }
        }

        // ЗАВАНТАЖЕННЯ ЧЕРЕЗ ЧИСТИЙ CSV (БЕЗ ПОМИЛОК ДОСТУПУ)
        function loadFightersFromSheets() {
            def('loading-text').style.display = 'block';
            def('leaderboard-container').innerHTML = '';

            fetch(SHEET_URL)
                .then(res => res.text())
                .then(text => {
                    const lines = text.split('\n').map(line => line.split(','));
                    fightersData = [];

                    lines.forEach((row, index) => {
                        if (index === 0) return; 
                        if (!row[1] || row[1].trim() === "") return; 

                        let name = row[1].replace(/"/g, '').trim();
                        let wins = parseInt(row[2]) || 0;
                        let losses = parseInt(row[3]) || 0;
                        let arms = row[4] ? row[4].replace(/"/g, '').trim() : "0 см";
                        let height = row[5] ? row[5].replace(/"/g, '').trim() : "0 см";
                        let weight = row[6] ? row[6].replace(/"/g, '').trim() : "0 кг";
                        let chin = row[7] ? row[7].replace(/"/g, '').trim() : "0 см";

                        let effectiveLosses = losses === 0 ? 1 : losses;
                        let kd = (wins / effectiveLosses).toFixed(2);

                    fightersData.push({
                            id: index,
                            name: name,
                            wins: wins,
                            losses: losses,
                            arms: arms,
                            height: height,
                            weight: weight,
                            chin: chin,
                            kd: parseFloat(kd)
                        });
                    });

                    fightersData.sort((a, b) => b.kd - a.kd);
                    renderLeaderboard();
                })
                .catch(err => {
                    def('loading-text').innerText = "Помилка завантаження! Перевірте доступ до таблиці.";
                    console.error(err);
                });
        }

        function renderLeaderboard() {
            def('loading-text').style.display = 'none';
            const container = def('leaderboard-container');
            container.innerHTML = "";

            fightersData.forEach((f, index) => {
                let rankClass = "";
                if (index === 0) rankClass = "rank-1";
                if (index === 1) rankClass = "rank-2";
                if (index === 2) rankClass = "rank-3";

                let av = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'/><circle cx='12' cy='7' r='4'/></svg>";

                container.innerHTML += `
                    <div class="leader-card" onclick="openFighterProfile('${f.name}')">
                        <div class="leader-row">
                            <div class="leader-clickable">
                                <img src="${av}" class="mini-avatar">
                                <span class="leader-rank ${rankClass}">#${index + 1}</span>
                                <span class="leader-name">${f.name}</span>
                            </div>
                        </div>
                        <div class="leader-row" style="margin-top: 5px;">
                            <div class="leader-stats">
                                <span>В: <strong style="color:var(--winner-green)">${f.wins}</strong></span>
                                <span>П: <strong style="color:var(--loser-red)">${f.losses}</strong></span>
                                <span class="kd-badge">KD: ${f.kd}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function openFighterProfile(name) {
            let f = fightersData.find(fighter => fighter.name === name);
            if (!f) {
                def('profNameTitle').innerText = name;
                def('lbl-arms').innerText = "—";
                def('lbl-height').innerText = "—";
                def('lbl-weight').innerText = "—";
                def('lbl-wins').innerText = "0";
                def('lbl-losses').innerText = "0";
                def('lbl-chin').innerText = "—";
            } else {
                def('profNameTitle').innerText = f.name;
                def('lbl-arms').innerText = f.arms;
                def('lbl-height').innerText = f.height;
                def('lbl-weight').innerText = f.weight;
                def('lbl-wins').innerText = f.wins;
                def('lbl-losses').innerText = f.losses;
                def('lbl-chin').innerText = f.chin;
            }

            def('profViewImg').src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='110' height='110' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'/><circle cx='12' cy='7' r='4'/></svg>";
            openModal('profileModal');
        }

        function openFighterProfileByName(name) {
            if (fightersData.length === 0) {
                fetch(SHEET_URL)
                    .then(res => res.text())
                    .then(text => {
                        const lines = text.split('\n').map(line => line.split(','));
                        fightersData = [];
                        lines.forEach((row, index) => {
                            if (index === 0 || !row[1] || row[1].trim() === "") return;
                            fightersData.push({
                                name: row[1].replace(/"/g, '').trim(), wins: parseInt(row[2])||0, losses: parseInt(row[3])||0,
                                arms: row[4]?row[4].replace(/"/g, '').trim():"0 см", height: row[5]?row[5].replace(/"/g, '').trim():"0 см", weight: row[6]?row[6].replace(/"/g, '').trim():"0 кг", chin: row[7]?row[7].replace(/"/g, '').trim():"0 см"
                            });
                        });
                        openFighterProfile(name);
                    }).catch(() => openFighterProfile(name));
            } else {
                openFighterProfile(name);
            }
        }

        function openPasswordModal() {
            if (document.body.classList.contains('admin-mode')) {
                document.body.classList.remove('admin-mode');
                def('mainGear').classList.remove('active');
                def('bracketGear').classList.remove('active');
                return;
            }
            openModal('passwordModal');
            def('passInput').focus();
        }

        function checkAdminPassword() {
            if (def('passInput').value === "606060") {
                document.body.classList.add('admin-mode');
                def('mainGear').classList.add('active');
                def('bracketGear').classList.add('active');
                closeModal('passwordModal');
                def('passInput').value = '';
            } else {
                alert("Невірний пароль!");
            }
        }

        function renderTournaments() {
            const container = def('tournaments-container');
            container.innerHTML = "";
            tournamentsData.forEach(t => {
                container.innerHTML += `
                    <div class="tournament-card">
                        <div class="tournament-info" onclick="startTournament(${t.id}, '${t.title}', ${t.size})">
                            <span>${t.title} (К-сть: ${t.size})</span>
                        </div>
                        <div class="admin-controls">
                            <button class="btn-action" onclick="deleteTournament(${t.id})">❌</button>
                        </div>
                    </div>
                `;
            });
        }

        function addNewTournament() {
            let title = prompt("Введіть назву турніру:");
            if (!title) return;
            let size = parseInt(prompt("Кількість бійців (2, 4, 8, 16, 32, 64):", "8"));
            if (![2,4,8,16,32,64].includes(size)) {
                alert("Невірна кількість бійців! Оберіть стандартне значення.");
                return;
            }
            let newId = tournamentsData.length > 0 ? Math.max(...tournamentsData.map(t => t.id)) + 1 : 1;
            tournamentsData.push({ id: newId, title: title, size: size });
            localStorage.setItem('tournamentsData', JSON.stringify(tournamentsData));
            renderTournaments();
        }

        function deleteTournament(id) {
            if (confirm("Видалити цей турнір та його сітку?")) {
                tournamentsData = tournamentsData.filter(t => t.id !== id);
                localStorage.removeItem(`bracket_input_t_${id}`);
                localStorage.removeItem(`bracket_winners_t_${id}`);
                localStorage.setItem('tournamentsData', JSON.stringify(tournamentsData));
                renderTournaments();
            }
        }

        function startTournament(id, title, size) {
            currentTournamentId = id;
            def('main-page').classList.remove('active');
            def('bracket-page').classList.add('active');
            def('active-tournament-title').innerText = title;
            def('custom-size-input').value = size;
            buildBracket();
        }

        function goToMainPage() {
            def('bracket-page').classList.remove('active');
            def('main-page').classList.add('active');
            currentTournamentId = null;
        }

        function updateTournamentSize() {
            let size = parseInt(def('custom-size-input').value);
            if (![2,4,8,16,32,64].includes(size)) {
                alert("Підтримуються тільки сітки на 2, 4, 8, 16, 32 чи 64 бійців!");
                return;
            }
            let t = tournamentsData.find(t => t.id === currentTournamentId);
            if(t) {
                t.size = size;
                localStorage.setItem('tournamentsData', JSON.stringify(tournamentsData));
                renderTournaments();
            }
            localStorage.removeItem(`bracket_input_t_${currentTournamentId}`);
            localStorage.removeItem(`bracket_winners_t_${currentTournamentId}`);
            buildBracket();
        }

        function buildBracket() {
            const size = parseInt(def('custom-size-input').value);
            const container = def('bracket-grid');
            container.innerHTML = "";

            let roundsCount = Math.log2(size);
            let savedInputs = JSON.parse(localStorage.getItem(`bracket_input_t_${currentTournamentId}`)) || {};
            let savedWinners = JSON.parse(localStorage.getItem(`bracket_winners_t_${currentTournamentId}`)) || {};

            let matchesInRound = size / 2;

            for (let r = 0; r < roundsCount; r++) {
                let roundEl = document.createElement('div');
                roundEl.className = 'round';
                
                let roundTitle = (r === roundsCount - 1) ? "Фінал" : `Раунд ${r + 1}`;

                for (let m = 0; m < matchesInRound; m++) {
                    let matchupEl = document.createElement('div');
                    matchupEl.className = 'matchup';
                    
                    let f1_id = `t_${currentTournamentId}_r_${r}_m_${m}_f_1`;
                    let f2_id = `t_${currentTournamentId}_r_${r}_m_${m}_f_2`;
                    let next_f_node = (m % 2 === 0) ? 1 : 2;
                    let next_m_index = Math.floor(m / 2);
                    let next_id = `t_${currentTournamentId}_r_${r+1}_m_${next_m_index}_f_${next_f_node}`;

                    let f1_name = savedInputs[f1_id] || (r === 0 ? `Боєць ${m * 2 + 1}` : "?");
                    let f2_name = savedInputs[f2_id] || (r === 0 ? `Боєць ${m * 2 + 2}` : "?");

                    let f1_status = savedWinners[f1_id] || "";
                    let f2_status = savedWinners[f2_id] || "";

                    matchupEl.innerHTML = `
                        <div class="match-title">${roundTitle} — Бій ${m + 1}</div>
                        <div class="fighter ${f1_status}" id="${f1_id}">
                            <div class="fighter-name-wrapper" onclick="handleFighterClick(this)">${f1_name}</div>
                            <button class="btn-crown" onclick="setWinner('${f1_id}', '${f2_id}', '${next_id}')">👑</button>
                        </div>
                        <div class="fighter ${f2_status}" id="${f2_id}">
                            <div class="fighter-name-wrapper" onclick="handleFighterClick(this)">${f2_name}</div>
                            <button class="btn-crown" onclick="setWinner('${f2_id}', '${f1_id}', '${next_id}')">👑</button>
                        </div>
                    `;
                    roundEl.appendChild(matchupEl);
                }
                container.appendChild(roundEl);
                matchesInRound /= 2;
            }
        }

        function handleFighterClick(element) {
            let currentName = element.innerText.trim();
            if (currentName === "?" || currentName === "— ПРОПУСКАЄ РАУНД —") return;

            if (document.body.classList.contains('admin-mode')) {
                let newName = prompt("Змінити ім'я бійця в сітці:", currentName);
                if (newName && newName.trim() !== "") {
                    element.innerText = newName.trim();
                    saveBracketInputs();
                }
            } else {
                openFighterProfileByName(currentName);
            }
        }

        function setWinner(winnerId, loserId, nextId) {
            const winEl = def(winnerId);
            const loseEl = def(loserId);

            winEl.classList.remove('loser'); winEl.classList.add('winner');
            loseEl.classList.remove('winner'); loseEl.classList.add('loser');

            const winnerName = winEl.querySelector('.fighter-name-wrapper').innerText;
            const nextEl = def(nextId);
            if (nextEl) nextEl.querySelector('.fighter-name-wrapper').innerText = winnerName;
            
            saveBracketInputs();
            saveBracketWinners();
        }

        function saveBracketInputs() {
            let inputs = {};
            document.querySelectorAll(`#bracket-grid .fighter-name-wrapper`).forEach(el => {
                let id = el.parentElement.id;
                inputs[id] = el.innerText.trim();
            });
            localStorage.setItem(`bracket_input_t_${currentTournamentId}`, JSON.stringify(inputs));
        }

        function saveBracketWinners() {
            let winners = {};
            document.querySelectorAll(`#bracket-grid .fighter`).forEach(el => {
                if (el.classList.contains('winner')) winners[el.id] = "winner";
                if (el.classList.contains('loser')) winners[el.id] = "loser";
            });
            localStorage.setItem(`bracket_winners_t_${currentTournamentId}`, JSON.stringify(winners));
        }

        function copyWalletAddress() {
            const address = def('tonWalletAddress').innerText;
            navigator.clipboard.writeText(address).then(() => {
                def('copyBtn').innerText = "✅ Скопіювано!";
                setTimeout(() => { def('copyBtn').innerText = "📋 Скопіювати адресу"; }, 2000);
            });
        }

        renderTournaments();
    </script>
</body>
</html>
