<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Підборідочні бої</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #030509; --card: rgba(15, 20, 32, 0.7); --accent: #00e5ff;
            --text: #ffffff; --green: #00e676; --red: #ff1744;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Анімації */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.4s ease-out forwards; }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        .header { text-align: center; padding: 40px 0; }
        h1 { color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); transition: 0.3s; }
        .card:active { transform: scale(0.98); border-color: var(--accent); }

        .btn-refresh { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }

        .kd-tag { background: rgba(0, 229, 255, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 6px; font-family: monospace; }
        
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #1a2233; border-radius: 12px; cursor: pointer; }
        .tab.active { border: 1px solid var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Підборідочні бої</h1></div>
    
    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('list')">Турніри</div>
        <div class="tab" onclick="switchTab('lead')">Лідерборд</div>
    </div>

    <button class="btn-refresh" onclick="loadData()">🔄 Оновити дані</button>
    <div id="content"></div>
</div>

<script>
    const SPREADSHEET_ID = '1qsUMSrSEvVQqx5gc8aPbtJXAgI5ciGK1zQwyB8sviH8';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

    // QoL: Збереження в локальний кеш
    function loadData() {
        fetch(CSV_URL)
            .then(res => res.text())
            .then(text => {
                const rows = text.split('\n').slice(1); // пропуск заголовка
                const data = rows.map(r => r.split(',')).filter(r => r[1]);
                localStorage.setItem('cached_fighters', JSON.stringify(data));
                render(data);
            })
            .catch(() => {
                const cached = JSON.parse(localStorage.getItem('cached_fighters'));
                if(cached) render(cached);
            });
    }

    function render(data) {
        const container = document.getElementById('content');
        container.innerHTML = data.map((f, i) => `
            <div class="card animate" style="animation-delay: ${i * 0.05}s">
                <div style="display:flex; justify-content:space-between">
                    <strong>${f[1].replace(/"/g, '')}</strong>
                    <span class="kd-tag">KD: ${ (f[2]/(f[3]||1)).toFixed(2) }</span>
                </div>
                <div style="margin-top:10px; font-size:0.9em; color:#aaa">
                    Перемог: <span style="color:var(--green)">${f[2]}</span> | 
                    Поразок: <span style="color:var(--red)">${f[3]}</span>
                </div>
            </div>
        `).join('');
    }

    function switchTab(t) {
        document.querySelectorAll('.tab').forEach(e => e.classList.toggle('active', e.innerText.toLowerCase().includes(t)));
        loadData();
    }

    loadData();
</script>
</body>
</html>
